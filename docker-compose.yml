services:

  nginx:
    image: ghcr.io/ronasit/php-nginx-dev:8.4
    working_dir: /app
    command: >
      bash -c "chmod +x ./docker/entrypoint.sh && ./docker/entrypoint.sh && cd /opt/docker && supervisord"
    ports:
      - 80:80
      - 443:443
    volumes:
      - ./:/app
    links:
      - pgsql
      - pgsql_test
    environment:
      WEB_DOCUMENT_ROOT: /app/public
      WEB_DOCUMENT_INDEX: index.php
      REDIS_PORT: "6379"
      XDEBUG_MAX_NESTING_LEVEL: 250
      XDEBUG_PROFILER_ENABLE: 0
      XDEBUG_START_WITH_REQUEST: 1
      XDEBUG_DISCOVER_CLIENT_HOST: 0
      XDEBUG_CLIENT_PORT: 9000
      XDEBUG_CLIENT_HOST: host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"

  pgsql:
    image: postgres:18.3
    ports:
      - 5432:5432
    environment:
      POSTGRES_HOST_AUTH_METHOD: "trust"
    volumes:
      - .:/app

  pgsql_test:
    image: postgres:18.3
    ports:
      - 5433:5432
    environment:
      POSTGRES_HOST_AUTH_METHOD: "trust"
      POSTGRESQL_FSYNC: "off"
    volumes:
      - .:/app

  redis:
    image: redis:8.6
    ports:
        - 6379:6379

  php:
    image: webdevops/php:8.4-alpine
    working_dir: /app
    volumes:
      - ./:/app
